<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Request System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>FRS</h2>
                <p id="userName" class="user-name"></p>
                <p id="userRole" class="user-role"></p>
            </div>

            <nav class="sidebar-nav">
                <ul id="navMenu">
                    <!-- Menu akan di-populate berdasarkan role -->
                </ul>
            </nav>

            <div class="sidebar-footer">
                <button class="btn-logout" onclick="logoutUser()">Logout</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <h1 id="pageTitle">Dashboard</h1>
                <div class="top-bar-right">
                    <span id="currentTime" class="current-time"></span>
                    <button class="btn-menu" onclick="toggleSidebar()">☰</button>
                </div>
            </div>

            <!-- Content Area -->
            <div class="content-area" id="contentArea">
                <!-- Dynamic content akan dimuat di sini -->
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden"></div>

    <script src="scripts.js"></script>
</body>
</html>
